<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Networking & Hardware Practice Exam (Interactive Cards + Sound)</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.5; background: #f3f4f6; color: #1f2937; padding: 20px; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; transition: background-color 0.4s ease; }
        .quiz-container { width: 100%; max-width: 600px; background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; box-sizing: border-box; transition: background-color 0.2s ease, transform 0.2s ease; }
        h1 { color: #1e40af; margin-top: 0; margin-bottom: 5px; font-size: 1.6rem; }
        .progress-bar-container { background: #e5e7eb; height: 6px; border-radius: 3px; margin: 25px 0; overflow: hidden; }
        .progress-bar { background: #1e40af; height: 100%; width: 0%; transition: width 0.3s ease; }
        .progress-text { font-size: 0.9rem; color: #6b7280; font-weight: 500; }
        .q-card { display: none; margin-top: 20px; text-align: left; }
        .q-card.active { display: block; }
        .q-text { font-weight: 600; font-size: 1.2rem; margin-bottom: 20px; color: #111827; }
        .opt { background: #f9fafb; border: 1px solid #e5e7eb; padding: 16px; margin-bottom: 12px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; font-size: 1rem; }
        .opt:hover { background: #f3f4f6; border-color: #d1d5db; }
        .correct { background: #d1fae5 !important; border-color: #34d399 !important; color: #065f46; font-weight: 600; }
        .wrong { background: #fee2e2 !important; border-color: #f87171 !important; color: #991b1b; }
        .status { font-weight: bold; margin-top: 15px; font-size: 1rem; display: none; text-align: center; }
        .nav-zone { margin-top: 25px; display: flex; justify-content: space-between; height: 45px; }
        .btn-nav { background: #4b5563; color: white; border: none; padding: 10px 20px; font-size: 1rem; font-weight: 600; border-radius: 8px; cursor: pointer; display: none; text-decoration: none; }
        .btn-nav:hover { background: #374151; }
        #next-btn { background: #1e40af; display: none; margin-left: auto; }
        #next-btn:hover { background: #1d4ed8; }
        .results-view { display: none; margin-top: 10px; }
        .score-banner { font-size: 1.5rem; font-weight: bold; color: #111827; margin-bottom: 25px; }
        .btn-reset { background: #1e40af; color: white; border: none; padding: 14px 28px; font-size: 1.1rem; font-weight: 600; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .btn-reset:hover { background: #1d4ed8; }
        .flash-correct { background-color: #ecfdf5 !important; }
        .flash-wrong { background-color: #fef2f2 !important; }
    </style>
</head>
<body>
<div id="main-container" class="quiz-container">
    <div id="quiz-main-view">
        <h1>Computer Systems Servicing Practice Exam (SET A)</h1>
        <div class="progress-bar-container">
            <div id="progress-indicator" class="progress-bar"></div>
        </div>
        <div id="progress-label" class="progress-text">Question 1 of 30</div>

        <div id="quiz-load-zone"></div>

        <div class="nav-zone">
            <button id="prev-btn" class="btn-nav" onclick="goToPrevQuestion()">← Back</button>
            <button id="next-btn" class="btn-nav" onclick="goToNextQuestion()">Next Question →</button>
        </div>
    </div>

    <div id="results-zone" class="results-view">
        <h1>Exam Evaluation</h1>
        <div id="score-display" class="score-banner"></div>
        <button class="btn-reset" onclick="initQuiz()">Retake Quiz</button>
    </div>
</div>

<script>
const staticQuizPool = [
  {q: "What is the common color for the USB 3.0 connector for Standard A receptacles and plugs?", a: "Blue", d: ["Black", "White", "Grey"]},
  {q: "What type of memory used in the Solid State Drive (SSD) as storage?", a: "Flash memory", d: ["Volatile Cache", "Magnetic storage", "Optical memory"]},
  {q: "It is originally, where the BIOS stored in a standard PC.", a: "Read Only Memory (ROM)", d: ["Random Access Memory (RAM)", "Solid State Drive (SSD)", "Hard Disk Drive (HDD)"]},
  {q: "Is a complete copy of everything stored on a physical optical disc.", a: "ISO image", d: ["ZIP archive", "IMG backup", "VHD container"]},
  {q: "What is the minimum requirement for hard disk drive capacity in Windows 10?", a: "16 GB for 32-bit OS or 20 GB for 64-bit OS", d: ["32 GB for 32-bit OS or 64 GB for 64-bit OS", "8 GB for 32-bit OS or 16 GB for 64-bit OS", "100 GB flat requirement"]},
  {q: "Where do Windows device drivers store?", a: "Registry", d: ["System32", "Program Files", "Boot Partition"]},
  {q: "What is the volt rating of the RED wire in a power supply?", a: "+5V", d: ["+12V", "+3.3V", "-12V"]},
  {q: "Is a network cable where one end is T568-A while the other is T568-B configuration.", a: "Cross-over", d: ["Straight-thru", "Roll-over", "Console"]},
  {q: "In Windows 7, when LAN connection has a cross and red indicator signifies that there is", a: "Problem with the LAN driver", d: ["IP conflict", "No internet gateway", "Cable disconnected"]},
  {q: "Which of the following hardware components can connect over a computer network?", a: "Network Interface Card", d: ["Graphics Card", "Sound Card", "SATA Expansion card"]},
  {q: "It is a networking device that forwards data packets between computer networks.", a: "Router", d: ["Hub", "Switch", "Repeater"]},
  {q: "WI-FI is a trademarked phrase, which means", a: "IEEE.802.11", d: ["IEEE.802.3", "IEEE.802.15", "IEEE.801.11"]},
  {q: "Is a collection of devices connected together in one physical location", a: "Local Area Network (LAN)", d: ["Wide Area Network (WAN)", "Metropolitan Area Network (MAN)", "Campus Area Network (CAN)"]},
  {q: "A type of network that interconnects multiple local area network", a: "Wide Area Network (WAN)", d: ["Personal Area Network (PAN)", "Local Area Network (LAN)", "Storage Area Network (SAN)"]},
  {q: "A computer program used to prevent, detect and remove possible threats to the system", a: "Anti-virus software", d: ["Firewall utility", "Intrusion Detection System", "Firmware update"]},
  {q: "Is a two or more PC are connected and share resources without going through a separate server computer", a: "Peer to peer network", d: ["Client-server network", "Domain environment", "Cloud ecosystem"]},
  {q: "What IP address used by the virtual machine to communicate over the physical network?", a: "Provider address", d: ["Loopback address", "Customer address", "Broadcast address"]},
  {q: "What type of version that protects unauthorized network access by utilizing a set-up password?", a: "WPA2-Personal", d: ["WPA2-Enterprise", "WEP Open", "RADIUS Client"]},
  {q: "consists of the user matrices, and capability tables that govern the rights and privileges of users.", a: "Access control list", d: ["Active Directory Tree", "Group Policy Object", "User Configuration Matrix"]},
  {q: "It occurs when an attacker or trusted insider steals data from a computer system and demands compensation for its return.", a: "Information extortion", d: ["Ransomware attack", "Phishing campaign", "Data spoofing"]},
  {q: "It monitors the initial security accreditation of an information system for tracking of changes.", a: "Continuous Assessment", d: ["Risk Mitigation", "Static Analysis", "Incident Response"]},
  {q: "What services in Windows Server that enables administrators to migrate data to a lower cost and tape media on file servers?", a: "Remote storage service", d: ["File System Resource Manager", "Distributed File System", "Shadow Copy Volume"]},
  {q: "What application group that contains a Client Access point and with at least one application specific resource?", a: "Virtual cluster server", d: ["Network Load Balancer", "Active Directory Domain", "Failover Storage Hub"]},
  {q: "A utility tool that test whether a particular host is reachable across an IP network.", a: "Ping", d: ["Nslookup", "Netstat", "Tracert"]},
  {q: "Which of the following keys is not appropriate to enter BIOS setup?", a: "F5", d: ["F2", "Del", "F10"]},
  {q: "What enables users of Windows that corrects any problems preventing from booting up normally?", a: "Safe mode", d: ["System Restore", "Command Prompt Recovery", "Task Manager"]},
  {q: "What starts up recovery options in a computer that essentially boot into the recovery partition of the main hard drive?", a: "Repair computer", d: ["BIOS safe-flash", "Chkdsk tool", "Startup Overclock Override"]},
  {q: "A single physical hard drive can divide into multiple ___ hard drives", a: "Logical", d: ["Physical", "Dynamic", "Sectored"]},
  {q: "What are the two types of interface used to communicate between the hard drive and the computer motherboard?", a: "Advanced Technology Attachment (ATA) and Serial Advanced Technology Attachment (SATA)", d: ["PCI Express and NVMe", "USB 3.0 and Thunderbolt", "SCSI and SAS"]},
  {q: "What is the spider-like interconnection in millions of pieces of information located on computers around the cyber space?", a: "World wide web", d: ["The Internet Protocol", "Local Network Web", "The Cloud Grid"]}
];

let activeQuestions = [];
let currentQuestionIndex = 0;
let userAnswers = {};

// Synthetic Audio Engine to avoid broken external links
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    // Resume context if browser blocked auto-play
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (type === 'correct') {
        // Upward pleasant notification chime
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
        osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    } else if (type === 'wrong') {
        // Flat buzz drop down tone
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.25);
    } else if (type === 'complete') {
        // Fast victory flourish arpeggio
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        notes.forEach((freq, index) => {
            const individualOsc = audioCtx.createOscillator();
            const individualGain = audioCtx.createGain();
            individualOsc.type = 'sine';
            individualOsc.frequency.setValueAtTime(freq, audioCtx.currentTime + (index * 0.08));
            individualGain.gain.setValueAtTime(0.2, audioCtx.currentTime + (index * 0.08));
            individualGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (index * 0.08) + 0.2);
            individualOsc.connect(individualGain);
            individualGain.connect(audioCtx.destination);
            individualOsc.start(audioCtx.currentTime + (index * 0.08));
            individualOsc.stop(audioCtx.currentTime + (index * 0.08) + 0.2);
        });
    }
}

function initQuiz() {
    const zone = document.getElementById('quiz-load-zone');
    const mainView = document.getElementById('quiz-main-view');
    const resultsZone = document.getElementById('results-zone');
    
    zone.innerHTML = "";
    currentQuestionIndex = 0;
    userAnswers = {};
    
    mainView.style.display = "block";
    resultsZone.style.display = "none";

    activeQuestions = [...staticQuizPool];
    activeQuestions.sort(() => Math.random() - 0.5);

    activeQuestions.forEach((item, idx) => {
        let options = [...item.d, item.a];
        options.sort(() => Math.random() - 0.5);

        let qCard = document.createElement('div');
        qCard.className = `q-card ${idx === 0 ? 'active' : ''}`;
        qCard.setAttribute('id', `q-card-${idx}`);
        
        let qText = document.createElement('div');
        qText.className = 'q-text';
        qText.textContent = `${idx + 1}. ${item.q}`;
        qCard.appendChild(qText);

        options.forEach(opt => {
            let optDiv = document.createElement('div');
            optDiv.className = 'opt';
            optDiv.textContent = opt;
            optDiv.onclick = function() { checkAnswer(this, opt === item.a, idx); };
            qCard.appendChild(optDiv);
        });

        let statusDiv = document.createElement('div');
        statusDiv.className = 'status';
        qCard.appendChild(statusDiv);

        zone.appendChild(qCard);
    });

    updateNavigationLayout();
}

function updateNavigationLayout() {
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const mainContainer = document.getElementById('main-container');
    
    mainContainer.classList.remove('flash-correct', 'flash-wrong');
    prevBtn.style.display = currentQuestionIndex > 0 ? "inline-block" : "none";

    if (userAnswers[currentQuestionIndex] !== undefined) {
        nextBtn.style.display = "inline-block";
        nextBtn.textContent = currentQuestionIndex === activeQuestions.length - 1 ? "Finish Exam" : "Next Question →";
    } else {
        nextBtn.style.display = "none";
    }

    const progressIndicator = document.getElementById('progress-indicator');
    const progressLabel = document.getElementById('progress-label');
    const percent = (currentQuestionIndex / activeQuestions.length) * 100;
    
    progressIndicator.style.width = `${percent}%`;
    progressLabel.textContent = `Question ${currentQuestionIndex + 1} of ${activeQuestions.length}`;
}

function checkAnswer(selectedElement, isCorrect, cardIdx) {
    const parentCard = selectedElement.parentElement;
    if (userAnswers[cardIdx] !== undefined) return;
    
    const allOptions = parentCard.querySelectorAll('.opt');
    const statusText = parentCard.querySelector('.status');
    const nextBtn = document.getElementById('next-btn');
    const mainContainer = document.getElementById('main-container');
    
    userAnswers[cardIdx] = { selected: selectedElement.textContent, isCorrect: isCorrect };

    if (isCorrect) {
        selectedElement.classList.add('correct');
        statusText.textContent = "✓ Correct Answer";
        statusText.style.color = "#059669";
        mainContainer.classList.add('flash-correct');
        playSound('correct');
    } else {
        selectedElement.classList.add('wrong');
        statusText.textContent = "✗ Incorrect";
        statusText.style.color = "#dc2626";
        mainContainer.classList.add('flash-wrong');
        playSound('wrong');
        
        allOptions.forEach(opt => {
            if (opt.textContent === activeQuestions[cardIdx].a) {
                opt.classList.add('correct');
            }
        });
    }
    statusText.style.display = "block";
    
    nextBtn.textContent = currentQuestionIndex === activeQuestions.length - 1 ? "Finish Exam" : "Next Question →";
    nextBtn.style.display = "inline-block";
}

function goToNextQuestion() {
    const currentCard = document.getElementById(`q-card-${currentQuestionIndex}`);
    currentCard.classList.remove('active');
    
    currentQuestionIndex++;
    
    if (currentQuestionIndex < activeQuestions.length) {
        const nextCard = document.getElementById(`q-card-${currentQuestionIndex}`);
        nextCard.classList.add('active');
        updateNavigationLayout();
    } else {
        showFinalMetrics();
    }
}

function goToPrevQuestion() {
    if (currentQuestionIndex === 0) return;
    
    const currentCard = document.getElementById(`q-card-${currentQuestionIndex}`);
    currentCard.classList.remove('active');
    
    currentQuestionIndex--;
    
    const prevCard = document.getElementById(`q-card-${currentQuestionIndex}`);
    prevCard.classList.add('active');
    
    updateNavigationLayout();
    
    const mainContainer = document.getElementById('main-container');
    if (userAnswers[currentQuestionIndex].isCorrect) {
        mainContainer.classList.add('flash-correct');
    } else {
        mainContainer.classList.add('flash-wrong');
    }
}

function showFinalMetrics() {
    document.getElementById('quiz-main-view').style.display = "none";
    const resultsZone = document.getElementById('results-zone');
    const scoreDisplay = document.getElementById('score-display');
    
    let correctCount = Object.values(userAnswers).filter(ans => ans.isCorrect).length;
    const total = activeQuestions.length;
    
    scoreDisplay.textContent = `Your Score: ${correctCount} / ${total} (${Math.round((correctCount / total) * 100)}%)`;
    resultsZone.style.display = "block";
    playSound('complete');
}

window.onload = initQuiz;
</script>
</body>
</html>
